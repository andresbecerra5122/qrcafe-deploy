services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qrcafe}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./QrCafe
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-qrcafe};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_very_long_random_secret_key_12345}
      JWT_ISSUER: ${JWT_ISSUER:-QrCafe.Api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-QrCafe.Admin}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-480}
      BOOTSTRAP_ADMIN_RESTAURANT_ID: ${BOOTSTRAP_ADMIN_RESTAURANT_ID:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-Initial Admin}
      BOOTSTRAP_ADMIN_ROLE: ${BOOTSTRAP_ADMIN_ROLE:-Manager}

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
